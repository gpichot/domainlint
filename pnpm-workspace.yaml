packages:
  - packages/*
  - docs

# Packages allowed to run install/postinstall scripts. In pnpm 11 this is
# the gate — `onlyBuiltDependencies` (per the public docs) is silently
# ignored and `allowBuilds` is what `pnpm approve-builds` actually writes.
allowBuilds:
  '@swc/core': true
  esbuild: true
  sharp: true

# Defer installing very fresh releases — mitigates supply-chain attacks
# where a malicious version is published and yanked within hours.
# Value is in minutes; 10080 = 7 days.
minimumReleaseAge: 10080
