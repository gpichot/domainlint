name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_only:
        description: Retrigger publish for the latest release (skip release-please)
        type: boolean
        default: true

jobs:
  release-please:
    if: inputs.publish_only != true
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  publish:
    needs: release-please
    if: always() && (inputs.publish_only == true || needs.release-please.outputs.release_created == 'true')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter domainlint build
      - run: pnpm --filter domainlint publish --no-git-checks --provenance
