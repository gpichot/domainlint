name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            test-cmd: test:coverage
          - os: windows-latest
            test-cmd: test:run
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter domainlint build
      - run: pnpm --filter domainlint ${{ matrix.test-cmd }}
      - name: Write coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: |
          node -e "
            const s = require('./packages/domainlint/coverage/coverage-summary.json').total;
            const fmt = v => v.pct + '% (' + v.covered + '/' + v.total + ')';
            const rows = [
              '| Metric | Coverage |',
              '|--------|----------|',
              '| Lines | ' + fmt(s.lines) + ' |',
              '| Statements | ' + fmt(s.statements) + ' |',
              '| Functions | ' + fmt(s.functions) + ' |',
              '| Branches | ' + fmt(s.branches) + ' |',
            ];
            const out = '## Coverage\n\n' + rows.join('\n') + '\n';
            require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, out);
          "
