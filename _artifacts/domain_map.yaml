library:
  name: 'domainlint'
  version: '0.7.0'
  repository: 'https://github.com/gpichot/domainlint'
  description: 'CLI architecture linter for TypeScript/JavaScript that enforces feature boundaries (cross-feature imports must go through barrel files) and detects import cycles, with tsconfig-paths-aware resolution and a programmatic Rule API for custom architectural constraints.'
  primary_framework: 'framework-agnostic'

domains:
  - name: 'Adoption & lifecycle'
    slug: 'adoption-lifecycle'
    description: 'Getting domainlint running on a real codebase, triaging the initial wave of violations, and deciding what to enforce vs defer.'

  - name: 'Configuration surface'
    slug: 'configuration'
    description: 'The static configuration surface exposed via domainlint.json — what each field does, how rule severities and per-feature overrides resolve, and which violations come from which rule key.'

  - name: 'Programmatic rule authoring'
    slug: 'rule-authoring'
    description: 'Writing TypeScript rules against the dependency graph using the Rule / WorkspaceRule interfaces and the GraphQuery API.'

  - name: 'Monorepo / workspace'
    slug: 'workspace'
    description: 'Cross-package boundaries, workspace detection, per-package configs, and the distinct workspace-level rule interface.'

  - name: 'Debugging & introspection'
    slug: 'debugging'
    description: 'Understanding why a specific file or cycle is being reported, and narrowing output during cleanup.'

skills:
  - name: 'Adopt domainlint on an existing codebase'
    slug: 'adopt-on-existing-codebase'
    domain: 'adoption-lifecycle'
    description: 'Run domainlint for the first time on a project, triage the initial wave of violations, and choose what to fix, warn, or disable per feature.'
    type: 'lifecycle'
    packages:
      - 'domainlint'
    covers:
      - 'First-run workflow: install, run `domainlint check`, read output'
      - 'Triaging Day-1 violations (often hundreds)'
      - 'Scoping output by feature (`--feature=<name>`)'
      - 'Choosing severities: `error` vs `warn` vs `off`'
      - 'Per-feature overrides in `domainlint.json` for legacy code'
      - 'Cycle-output flags (`--shortest-cycles`, `--max-cycle-length`)'
      - 'Why `npm ci`/`pnpm install` must run before `domainlint check` (tsconfig paths)'
    tasks:
      - 'Add domainlint to a project and get a clean first run'
      - 'Decide which violations to fix now vs defer'
      - 'Quarantine a legacy feature so the rest of the codebase stays strict'
      - 'Add domainlint to CI without immediately breaking the build'
    failure_modes:
      - mistake: 'Treats every Day-1 violation as urgent'
        mechanism: 'Agent sees 200 errors and tries to fix them all at once instead of triaging by severity and feature scope.'
        wrong_pattern: |
          # Agent dives straight in:
          domainlint check
          # → 200 violations, agent starts editing files at random
        correct_pattern: |
          # Triage first: scope by feature, downgrade legacy
          domainlint check --feature=billing
          # Then in domainlint.json:
          {
            "overrides": {
              "global": { "rules": { "cross-feature-imports": "error" } },
              "features": {
                "legacy-billing": { "rules": { "cross-feature-imports": "warn" } }
              }
            }
          }
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['adopt-on-existing-codebase']

      - mistake: 'Runs domainlint before installing dependencies'
        mechanism: 'tsconfig path aliases resolve against installed packages; without `node_modules`, paths silently fail to resolve and many edges are treated as external/ignored.'
        wrong_pattern: |
          # CI step before install
          - run: npx domainlint check
        correct_pattern: |
          - run: npm ci
          - run: npx domainlint check
        source: 'docs/src/content/docs/ci.mdx'
        priority: 'HIGH'
        status: 'active'
        skills: ['adopt-on-existing-codebase']

      - mistake: 'Project layout does not match defaults — agent assumes "no violations" means clean'
        mechanism: 'Default `featuresDir` is `src/features`; if the project uses `app/modules/` (or similar), no features are detected and only cycle checks meaningfully run.'
        wrong_pattern: |
          // Project actually uses app/modules/
          // Agent runs `domainlint check`, sees 0 violations, declares done.
        correct_pattern: |
          // domainlint.json
          {
            "srcDir": "app",
            "featuresDir": "app/modules"
          }
        source: 'docs/src/content/docs/feature-structure.mdx, docs/src/content/docs/configuration.mdx'
        priority: 'HIGH'
        status: 'active'
        skills: ['adopt-on-existing-codebase', 'configure']

      - mistake: 'Excludes a noisy file via `exclude` instead of using a per-feature override'
        mechanism: '`exclude` removes a file from analysis entirely (it also stops contributing to cycle detection); the right tool for "this feature is exempt from one rule" is an `overrides.features` entry.'
        wrong_pattern: |
          {
            "exclude": ["src/features/legacy/**"]
          }
        correct_pattern: |
          {
            "overrides": {
              "features": {
                "legacy": {
                  "rules": { "cross-feature-imports": "off", "import-cycles": "off" }
                }
              }
            }
          }
        source: 'docs/src/content/docs/configuration.mdx'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['adopt-on-existing-codebase', 'configure']

  - name: 'Configure domainlint via domainlint.json'
    slug: 'configure'
    domain: 'configuration'
    description: 'Author and edit `domainlint.json` to match the project layout, set rule severities, and apply per-feature overrides.'
    type: 'core'
    packages:
      - 'domainlint'
    covers:
      - 'Top-level fields: `rootDir`, `srcDir`, `featuresDir`, `barrelFiles`, `extensions`, `tsconfigPath`, `exclude`, `includeDynamicImports`'
      - 'Rule severity keys: `import-cycles`, `cross-feature-imports`, `no-external-feature-imports`'
      - 'Severity values: `"error" | "warn" | "off"`'
      - 'Global vs per-feature `overrides` resolution order (feature → global → default)'
      - 'Zod validation: invalid config → exit code 2'
      - 'Workspace-only fields: `packageRules`, `packageRulesFile`'
    tasks:
      - 'Map a non-default layout (e.g. `app/modules/`) to the config'
      - 'Disable a rule for one legacy feature without affecting the rest'
      - 'Downgrade cycles to warnings globally while keeping cross-feature imports as errors'
      - 'Add a custom barrel filename (e.g. `public.ts`)'
    reference_candidates:
      - topic: 'Full domainlint.json schema and override resolution'
        reason: '8+ top-level fields plus nested override structures; agents need an authoritative reference to avoid guessing key names.'
    failure_modes:
      - mistake: 'Uses violation code as override key (e.g. `noImportCycle` instead of `import-cycles`)'
        mechanism: 'Violation codes are Biome-style camelCase (`noImportCycle`, `noCrossFeatureDeepImport`); override keys in `domainlint.json` are kebab-case (`import-cycles`, `cross-feature-imports`). They look like they should match but they do not.'
        wrong_pattern: |
          {
            "overrides": {
              "global": {
                "rules": { "noImportCycle": "warn" }
              }
            }
          }
        correct_pattern: |
          {
            "overrides": {
              "global": {
                "rules": { "import-cycles": "warn" }
              }
            }
          }
        source: 'docs/src/content/docs/configuration.mdx (rule names table), docs/src/content/docs/rules.mdx (violation codes)'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['configure']

      - mistake: 'Uses a path or glob as the feature override key'
        mechanism: '`overrides.features` is keyed by **feature name** (the directory name directly under `featuresDir`), not by glob or path.'
        wrong_pattern: |
          {
            "overrides": {
              "features": {
                "src/features/legacy-billing": {
                  "rules": { "import-cycles": "off" }
                }
              }
            }
          }
        correct_pattern: |
          {
            "overrides": {
              "features": {
                "legacy-billing": {
                  "rules": { "import-cycles": "off" }
                }
              }
            }
          }
        source: 'docs/src/content/docs/configuration.mdx'
        priority: 'HIGH'
        status: 'active'
        skills: ['configure']

      - mistake: 'Forgets the leading `.` on `extensions`'
        mechanism: 'Zod schema enforces `extensions: z.array(z.string().startsWith("."))`. `["ts", "tsx"]` fails validation with exit code 2 before any linting runs.'
        wrong_pattern: |
          { "extensions": ["ts", "tsx"] }
        correct_pattern: |
          { "extensions": [".ts", ".tsx"] }
        source: 'docs/src/content/docs/configuration.mdx (Zod schema section)'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['configure']

      - mistake: 'Assumes `no-external-feature-imports` is on by default'
        mechanism: 'Unlike `import-cycles` and `cross-feature-imports` (default `error`), `no-external-feature-imports` defaults to `off`. Agent enables a refactor based on the assumption that imports from non-feature directories are already blocked.'
        wrong_pattern: |
          // Agent leaves default config and asserts:
          // "Imports from src/lib into features are already blocked by default."
        correct_pattern: |
          {
            "overrides": {
              "global": {
                "rules": { "no-external-feature-imports": "error" }
              }
            }
          }
        source: 'docs/src/content/docs/configuration.mdx (rule defaults table)'
        priority: 'HIGH'
        status: 'active'
        skills: ['configure']

  - name: 'Write a custom domainlint rule'
    slug: 'write-custom-rule'
    domain: 'rule-authoring'
    description: 'Author a custom `Rule` in `domainlint.rules.ts` using the `GraphQuery` API and `emitViolation` to enforce project-specific import constraints — including layered or domain-driven architectures.'
    type: 'core'
    packages:
      - 'domainlint'
    covers:
      - '`Rule` interface (`name`, `check`)'
      - '`RuleContext` shape: `query`, `graph`, `config`, `emitViolation`'
      - 'Full `GraphQuery` surface: edge queries, node queries, transitive analysis, aggregates'
      - 'Violation shape: `code`, `file`, `line`, `col`, `message`'
      - 'The `query.edgesFrom(...).violations(code, message)` shorthand'
      - 'Auto-discovery from `domainlint.rules.ts` / `.js` or via `rulesFile` config'
      - 'Modeling layered / DDD architectures (domain → infrastructure → ui boundaries)'
    tasks:
      - 'Ban imports from a path (e.g. `src/lib/internal/**`)'
      - 'Enforce a layered architecture (domain cannot import infrastructure)'
      - 'Flag files exceeding a fan-out threshold'
      - 'Enforce that a specific feature only imports from a fixed allowlist of others'
      - 'Model a DDD structure: bounded contexts + aggregate boundaries as rules'
    reference_candidates:
      - topic: 'Full `GraphQuery` API method list with signatures and return shapes'
        reason: 'The 11 GraphQuery methods (`edgesFrom`, `edgesTo`, `edgesBetween`, `filesMatching`, `featureOf`, `importsOf`, `importersOf`, `dependsOn`, `dependenciesOf`, `dependentsOf`, `fanOut`, `fanIn`) are the #1 hallucination surface per maintainer.'
      - topic: 'DDD architecture rule cookbook'
        reason: 'Maintainer asked for worked DDD examples (layered boundaries, bounded contexts) as a reference companion to the skill.'
    failure_modes:
      - mistake: 'Hallucinates GraphQuery methods that do not exist'
        mechanism: 'The real surface has 11 methods. Agents trained on generic graph libraries invent plausible-looking calls like `query.cycles()`, `query.deps(file)`, `query.filesIn(glob)`, `query.imports(file)` that compile-fail or silently return undefined.'
        wrong_pattern: |
          for (const file of query.filesIn("src/domain/**")) {        // ❌ no such method
            for (const dep of query.deps(file)) {                      // ❌ no such method
              if (query.cycles().includes(dep)) { /* ... */ }          // ❌ no such method
            }
          }
        correct_pattern: |
          // The actual surface — see GraphQuery API reference.
          for (const file of query.filesMatching("src/domain/**")) {
            for (const dep of query.importsOf(file)) {
              if (query.dependsOn(dep, "src/infrastructure")) { /* ... */ }
            }
          }
        source: 'maintainer interview, docs/src/content/docs/graphquery-api.mdx'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['write-custom-rule']

      - mistake: 'Writes rule from a vague human spec without nailing down scope'
        mechanism: 'User says "ban utils imports" — agent writes the rule against any edge into `utils/**`. The user actually meant only deep imports from features, or only non-type-only imports, or only from a specific layer. The rule fires on a CI build and floods the team with false positives.'
        wrong_pattern: |
          // User: "ban utils imports"
          // Agent immediately writes:
          for (const edge of query.edgesTo("src/utils/**").edges) {
            emitViolation({ code: "NO_UTILS", file: edge.from, line: edge.importInfo.line, col: edge.importInfo.col, message: "No utils imports" });
          }
          // Misses: who is "anyone"? Are type-only imports OK? Are same-feature deep imports OK?
        correct_pattern: |
          // Probe first:
          // - Which importers? (features only? all of src?)
          // - Type-only OK? (`edge.importInfo.isTypeOnly`)
          // - Dynamic imports? (`edge.importInfo.isDynamic`)
          // Then write a precise rule:
          for (const edge of query.edgesBetween("src/features/**", "src/utils/**").edges) {
            if (edge.importInfo.isTypeOnly) continue;
            emitViolation({ code: "NO_UTILS_FROM_FEATURES", file: edge.from,
              line: edge.importInfo.line, col: edge.importInfo.col,
              message: "Features must not import from src/utils" });
          }
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['write-custom-rule']

      - mistake: 'Confuses module-level `Rule` with workspace-level `WorkspaceRule`'
        mechanism: 'Both interfaces have `name` + `check`, but the context shapes differ — `Rule` gets `query`/`graph`/`config`; `WorkspaceRule` gets `packages`/`edges`/`packageRules`. Agent exports a `WorkspaceRule` from a per-package `domainlint.rules.ts` or accesses `query` inside a workspace rule.'
        wrong_pattern: |
          // workspace-root/domainlint.rules.ts
          import type { WorkspaceRule } from "domainlint";
          export const workspaceRules: WorkspaceRule[] = [{
            name: "no-app-to-lib",
            check({ query, emitViolation }) {                  // ❌ no `query` in workspace context
              for (const edge of query.edgesFrom("apps/**").edges) { /* ... */ }
            },
          }];
        correct_pattern: |
          export const workspaceRules: WorkspaceRule[] = [{
            name: "no-app-to-lib",
            check({ edges, emitViolation }) {
              for (const edge of edges) {
                if (edge.fromPackage.startsWith("apps/") && edge.toPackage.startsWith("libs/internal")) {
                  emitViolation({ file: edge.file, line: edge.line, col: edge.col,
                    message: `App "${edge.fromPackage}" cannot import "${edge.toPackage}"` });
                }
              }
            },
          }];
        source: 'docs/src/content/docs/custom-rules.mdx, docs/src/content/docs/workspaces.mdx'
        priority: 'HIGH'
        status: 'active'
        skills: ['write-custom-rule', 'use-in-monorepo']

      - mistake: 'Forgets `emitViolation` — rule silently does nothing'
        mechanism: 'Rule returns an array of violation objects (mimicking older API shapes) instead of calling `emitViolation`. No error is thrown; the rule appears to run but never reports.'
        wrong_pattern: |
          const noUtils: Rule = {
            name: "no-utils",
            check({ query }) {
              const violations = [];
              for (const edge of query.edgesTo("src/utils/**").edges) {
                violations.push({ code: "NO_UTILS", file: edge.from, /* ... */ });
              }
              return violations;                               // ❌ silently ignored
            },
          };
        correct_pattern: |
          const noUtils: Rule = {
            name: "no-utils",
            check({ query, emitViolation }) {
              for (const edge of query.edgesTo("src/utils/**").edges) {
                emitViolation({ code: "NO_UTILS", file: edge.from,
                  line: edge.importInfo.line, col: edge.importInfo.col,
                  message: "No utils imports" });
              }
            },
          };
        source: 'docs/src/content/docs/custom-rules.mdx'
        priority: 'HIGH'
        status: 'active'
        skills: ['write-custom-rule']

      - mistake: 'Re-implements an existing built-in or override instead of using config'
        mechanism: 'Agent writes a custom rule to ban cross-feature deep imports — duplicating R2 which is already on by default. Or writes a rule to disable a check for one feature when an `overrides.features` entry would suffice.'
        wrong_pattern: |
          // Custom rule re-implementing R2:
          const noDeepCrossFeature: Rule = {
            name: "no-deep-cross-feature",
            check({ query, emitViolation, config }) { /* ...lots of code... */ },
          };
        correct_pattern: |
          // R2 is already enforced as `cross-feature-imports`.
          // To exempt a feature, use overrides — no custom rule needed:
          {
            "overrides": {
              "features": {
                "legacy": { "rules": { "cross-feature-imports": "off" } }
              }
            }
          }
        source: 'docs/src/content/docs/rules.mdx, docs/src/content/docs/configuration.mdx'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['write-custom-rule', 'configure']

  - name: 'Use domainlint in a monorepo'
    slug: 'use-in-monorepo'
    domain: 'workspace'
    description: 'Run domainlint across npm/pnpm/yarn workspaces, configure cross-package import restrictions, and write workspace-level custom rules.'
    type: 'framework'
    packages:
      - 'domainlint'
    covers:
      - 'Workspace detection: `pnpm-workspace.yaml`, then `package.json` `"workspaces"`'
      - 'Per-package `domainlint.json` and `tsconfig.json`'
      - 'Packages without `srcDir` are silently skipped'
      - 'Workspace-root `packageRules` (deny-list using globs on package paths)'
      - 'Built-in workspace rules: `noPackageImport`, `noPackageCycle`'
      - '`WorkspaceRule` interface and `WorkspaceRuleContext` shape'
      - '`packageRulesFile` to load workspace rules from a custom path'
    tasks:
      - 'Add domainlint to a pnpm workspace'
      - 'Deny imports from `packages/feature-*` into `packages/core`'
      - 'Disable workspace-level rules while keeping per-package rules'
      - 'Write a workspace rule that fires only when both packages match a pattern'
    failure_modes:
      - mistake: 'Defines `packageRules` or `workspaceRules` inside a package instead of the workspace root'
        mechanism: 'Workspace-level config lives at the workspace root `domainlint.json` / `domainlint.rules.ts`. Putting it inside `packages/foo/` means it never runs as a workspace rule — at best it loads as a module-level rule with the wrong context.'
        wrong_pattern: |
          # packages/core/domainlint.json
          {
            "packageRules": [
              { "from": "packages/core", "deny": ["packages/feature-*"] }
            ]
          }
        correct_pattern: |
          # ./domainlint.json (workspace root)
          {
            "packageRules": [
              { "from": "packages/core", "deny": ["packages/feature-*"] }
            ]
          }
        source: 'docs/src/content/docs/workspaces.mdx'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['use-in-monorepo']

      - mistake: 'Uses package npm name (`@org/core`) for `packageRules.from` / `deny`'
        mechanism: '`from` and `deny` are glob patterns over package **paths** relative to the workspace root (e.g. `packages/core`), not npm package names. Agents default to the npm name.'
        wrong_pattern: |
          {
            "packageRules": [
              { "from": "@my/core", "deny": ["@my/feature-*"] }
            ]
          }
        correct_pattern: |
          {
            "packageRules": [
              { "from": "packages/core", "deny": ["packages/feature-*"] }
            ]
          }
        source: 'docs/src/content/docs/workspaces.mdx'
        priority: 'HIGH'
        status: 'active'
        skills: ['use-in-monorepo']

      - mistake: 'Adds a package that has no `src/` and expects it to be linted'
        mechanism: 'Packages without the configured `srcDir` are automatically skipped with a "No src/features directory found" message. Agent assumes the package is covered.'
        wrong_pattern: |
          // packages/docs has only content/ — no src/.
          // Agent: "domainlint is linting all packages, including docs."
        correct_pattern: |
          // Either add a packages/docs/domainlint.json with the right `srcDir`,
          // or accept that docs is intentionally skipped.
        source: 'docs/src/content/docs/workspaces.mdx, ROADMAP.md (workspace support)'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['use-in-monorepo']

      - mistake: 'Assumes Bun workspaces or Nx project graphs are auto-detected'
        mechanism: 'Only `pnpm-workspace.yaml` and `package.json` `"workspaces"` (npm/yarn) are detection sources. Bun-only workspaces and Nx-only project graphs are not detected.'
        wrong_pattern: |
          // bunfig.toml-only workspace, no pnpm-workspace.yaml, no "workspaces" in package.json
          // Agent runs `domainlint check` and reports per-package results.
        correct_pattern: |
          // Convert to a supported workspace declaration:
          // package.json
          { "workspaces": ["packages/*"] }
        source: 'docs/src/content/docs/workspaces.mdx (detection sources)'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['use-in-monorepo']

  - name: 'Debug a single violation'
    slug: 'debug-a-violation'
    domain: 'debugging'
    description: 'Diagnose why a specific file is flagged, narrow noisy cycle output, and trace the offending import.'
    type: 'core'
    packages:
      - 'domainlint'
    covers:
      - '`domainlint debug <file>` — per-file import + violation dump'
      - '`--shortest-cycles` — collapse long SCCs to minimum-length cycles'
      - '`--max-cycle-length=<n>` — suppress cycles longer than n (default 50)'
      - '`--feature=<name>` — narrow to one feature during cleanup'
      - '`--verbose` — full violation listings per package in workspaces'
      - 'Reading cycle output format: `a -> b -> c -> a`'
    tasks:
      - 'Figure out why `src/features/billing/ui/Form.tsx` is flagged'
      - 'Shrink a 30-step cycle output to something fixable'
      - 'Confirm what imports a specific file resolves to'
    failure_modes:
      - mistake: 'Stares at a 50-deep cycle without `--shortest-cycles`'
        mechanism: 'A strongly-connected component can produce very long cycle paths in the default output; `--shortest-cycles` reduces each SCC to its minimum-length cycle, which is the actually-fixable view.'
        wrong_pattern: |
          domainlint check
          # Output: a -> b -> c -> ... -> z -> a (50 steps), agent gives up.
        correct_pattern: |
          domainlint check --shortest-cycles
        source: 'docs/src/content/docs/cli.mdx, README.md'
        priority: 'HIGH'
        status: 'active'
        skills: ['debug-a-violation']

      - mistake: 'Tries to reason about a file in isolation instead of using `domainlint debug`'
        mechanism: '`domainlint debug <file>` resolves all imports for the single file using the real resolver and reports any rule violations. Skipping it leads to manual guessing about how a specifier resolved (or did not).'
        wrong_pattern: |
          # Agent reads the file, grep-traces specifiers by hand.
        correct_pattern: |
          domainlint debug src/features/billing/ui/Form.tsx
        source: 'docs/src/content/docs/cli.mdx'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['debug-a-violation']

      - mistake: 'Forgets `--feature=<name>` during incremental cleanup'
        mechanism: 'Without scoping, every CI run after a partial fix re-dumps every violation, making progress invisible.'
        wrong_pattern: |
          domainlint check
        correct_pattern: |
          domainlint check --feature=billing
        source: 'docs/src/content/docs/cli.mdx'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['debug-a-violation', 'adopt-on-existing-codebase']

tensions:
  - name: 'Adoption ease vs architectural strictness'
    skills: ['adopt-on-existing-codebase', 'configure']
    description: 'Downgrading every rule to `warn` to land domainlint on a legacy codebase makes adoption painless but lets the same architecture continue to rot.'
    implication: 'Agents asked to "make domainlint pass" often globally downgrade severities, defeating the purpose. The right move is per-feature `off` (or `warn`) for a contained legacy area while keeping the rest of the codebase at `error`.'

  - name: 'Custom rule expressiveness vs config-first simplicity'
    skills: ['write-custom-rule', 'configure']
    description: 'The programmatic `Rule` API can express anything; an `overrides` entry can express only severity changes — but agents reach for code when config would do.'
    implication: 'Agents over-author custom rules to disable / scope built-in checks, duplicating logic that already exists. Always ask: does `overrides` solve this before writing a rule?'

  - name: 'Module-level Rule vs Workspace-level WorkspaceRule'
    skills: ['write-custom-rule', 'use-in-monorepo']
    description: 'Both interfaces have `name` + `check`, but the context shapes diverge (`query`/`graph`/`config` vs `packages`/`edges`/`packageRules`). They are mirror images, easy to mix up.'
    implication: 'Agents export the wrong interface or destructure non-existent fields from the context, producing rules that compile but never fire or throw at runtime.'

cross_references:
  - from: 'adopt-on-existing-codebase'
    to: 'configure'
    reason: 'Triaging Day-1 violations is mostly an exercise in writing the right `overrides` block — adoption work routes into the configuration surface.'

  - from: 'adopt-on-existing-codebase'
    to: 'debug-a-violation'
    reason: 'During cleanup, agents need `domainlint debug` and `--shortest-cycles` to make individual violations tractable.'

  - from: 'configure'
    to: 'write-custom-rule'
